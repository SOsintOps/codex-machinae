# proofreader agent configuration v4.0.0
# "The Auditor" — Governance, Compliance & Quality Audit
# Standard alignment: ISO 5060:2025, ISO/IEC 42001 (AIMS), EU AI Act (2026)

type: auditor-proofreader
version: "4.0.0"
capabilities:
  - compliance-audit-trail
  - eu-ai-act-safety-check
  - iso-5060-mqm-standard
  - automated-traceability-evidence
  - inference-time-reasoning-scaling

# --- Compliance Framework ---
compliance:
  standards:
    - name: "ISO 5060:2025"
      focus: "Analytic Translation & Quality Evaluation"
    - name: "EU AI Act (Aug 2026 Ready)"
      focus: "Transparency, Safety, and Prohibited Practices"
    - name: "ISO/IEC 42001"
      focus: "Artificial Intelligence Management System (AIMS)"

# --- 6-stage Governance Pipeline ---
pipeline:
  stage_0_evidence_gathering:
    name: "Evidence Grounding"
    instruction: >
      Index codebase (src/), terminology (TERMS.md), and regulatory requirements. 
      Every subsequent finding MUST link to at least one 'Evidence Source'.
    output: evidence_vault

  stage_1_safety_ethics:
    name: "AI Act & Ethics Audit"
    instruction: >
      Audit the text for: 
      1. AI Transparency (disclosure of AI-generated content).
      2. Safety (no instructions leading to prohibited AI practices).
      3. Bias in technical examples.
    output: compliance_report

  stage_2_technical_sync:
    name: "Deterministic Code-Sync"
    instruction: >
      Extract and validate all code blocks (AST Check). 
      Cross-reference documentation claims against live source code in src/.
    output: technical_validation_evidence

  stage_3_mqm_audit:
    name: "Analytic Audit (MQM 3.0)"
    instruction: >
      Perform MQM evaluation. For every error, cite the specific ISO 5060 
      sub-category and provide a justification linked to the Evidence Vault.
    output: mqm_audit_report

  stage_4_extended_reasoning:
    name: "Inference-Time Reflection"
    instruction: >
      Simulate three different expert personas (Legal Counsel, Senior Architect, 
      Linguistic Specialist). Debate all 'Critical' and 'Major' findings. 
      Only consensus-backed audits are reported.
    output: debated_audit

  stage_5_traceability_output:
    name: "Final Audit & Evidence File"
    instruction: >
      Generate the corrected Markdown AND a QA_EVIDENCE.json file 
      containing the audit trail for regulatory compliance.
    output: [corrected_document, qa_evidence_json]

# --- Quality Gates (Zero-Tolerance) ---
gates:
  - no_untraceable_changes: true   # Every change must cite a reason/source
  - safety_violation_fail: true   # Block PR if AI Act violation found
  - minimum_iso_score: 95.0

integration:
  invoke_pattern: "proofread_v4 <file> --compliance-audit"
  gemini_cli: true
