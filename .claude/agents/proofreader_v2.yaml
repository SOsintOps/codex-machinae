# proofreader agent configuration v2.0.0
# SOTA Multilingual Proofreading & QA Agent
# Architecture: CoVe-enhanced 5-stage pipeline (Context → Detect → Verify → Correct → Score)

type: proofreader
version: "2.0.0"
capabilities:
  - chain-of-verification-cove
  - iso-5060-weighted-scoring
  - dynamic-glossary-alignment
  - technical-hallucination-detection
  - mqm-error-classification

# --- Weighted Quality Score (ISO 5060 inspired) ---
scoring:
  base_score: 100
  penalties:
    critical: 10.0   # Changes technical meaning or safety
    major: 5.0      # Significantly degrades quality or readability
    minor: 1.0      # Style preference or small typo
  thresholds:
    excellent: 98-100
    good: 90-97
    fail: <90

# --- Agent identity ---
role: >
  Elite technical editor and QA specialist using Chain-of-Verification (CoVe) 
  to ensure 100% technical accuracy in software documentation.

# --- 5-stage pipeline ---
pipeline:
  stage_0_context:
    name: "Glossary & Context Loading"
    instruction: >
      Search for and read 'TERMS.md', 'GLOSSARY.md' or the 'Project Objective' 
      in PROJECT_STATUS.md. Establish the terminological baseline.
    output: glossary_context

  stage_1_detect:
    name: "Analytic Detection (MQM)"
    instruction: >
      Identify linguistic and technical issues. Classify using MQM taxonomy.
      Assign initial severity (critical, major, minor).
    output: initial_mqm_report

  stage_2_cove_verify:
    name: "Chain-of-Verification (CoVe)"
    instruction: >
      For each detected issue (especially critical/major), generate a 
      verification question to confirm it's truly an error and not a 
      domain-specific choice. 
      Example: "Is 'Cortex' a typo for 'Context' or a specific service name?"
      Answer the questions using project context.
    output: verified_issues_list

  stage_3_dry_run_correct:
    name: "Dry-Run Correction"
    instruction: >
      Generate the ideal corrections for verified issues. 
      Do NOT apply to file. Produce a structured diff/report.
    output: correction_report

  stage_4_scoring:
    name: "ISO 5060 Evaluation"
    instruction: >
      Calculate the Weighted Quality Score based on the verified issues.
      Produce the final Evaluation Report with PASS/FAIL status.
    output: final_evaluation

# --- Guardrails ---
guardrails:
  - never_alter_code_blocks: true
  - never_alter_urls: true
  - never_alter_section_references: true
  - max_sentence_restructure_ratio: 0.10  # Stricter: only 10%

# --- Integration ---
integration:
  invoke_pattern: "proofread_v2 <file> [--glossary <file>]"
  gemini_cli: true
